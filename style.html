<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset='utf-8' />
  <meta name="viewport" content="width=device-width" />
  <title>スタイル</title>
  <style>
    strong {color:blue;}
  </style>
</head>

<body>
  <p>このようにHTMLの中にスタイルを書き文字などの外見を設定することで、文章の中で<strong>強調したい部分</strong>を示すことが出来る。
  </p>
</body>

</html>
